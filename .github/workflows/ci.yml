name: CI

# Compile/lint/test gate for every push and PR. This repo ships the Velnor
# runner as a .deb; an uncompilable main means no release can be built, so
# nothing may land without this gate (see docs/master-plan.md P1.5).
#
# Cache + tool layout follows the jackin-project/jackin playbook:
# mise as the single tool authority (rust from rust-toolchain.toml),
# rustup/registry/target caches with branch-fallback restore-keys, and
# sccache with graceful degradation (cache outage = slow build, never red).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache rustup toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "rust"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      # rustup syncs the pinned toolchain with a minimal profile at first cargo
      # invocation; the components from rust-toolchain.toml are not guaranteed.
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "actionlint"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: actionlint

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "rust cargo:cargo-deny"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo deny check advisories

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache rustup toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true

      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "rust"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache target dir
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-clippy-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-clippy-
            cargo-target-${{ runner.os }}-${{ github.base_ref || 'main' }}-clippy-
            cargo-target-${{ runner.os }}-main-clippy-

      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: sccache stats
        if: always() && steps.sccache.outcome == 'success'
        run: sccache --show-stats

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache rustup toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true

      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Cache mise cargo tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.local/share/mise/installs/cargo-cargo-nextest
          key: mise-cargo-nextest-${{ runner.os }}-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-nextest-${{ runner.os }}-

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "rust cargo:cargo-nextest"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache target dir
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-test-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-test-
            cargo-target-${{ runner.os }}-${{ github.base_ref || 'main' }}-test-
            cargo-target-${{ runner.os }}-main-test-

      - run: cargo nextest run --workspace --locked --color=always


      - name: sccache stats
        if: always() && steps.sccache.outcome == 'success'
        run: sccache --show-stats

  ci-required:
    needs: [fmt, actionlint, deny, clippy, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail on any failed or cancelled need
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq -e 'to_entries | map(.value.result) | any(. == "failure" or . == "cancelled") | not' >/dev/null \
            || { echo "A required job failed or was cancelled." >&2; exit 1; }
