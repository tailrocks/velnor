name: Release deb

# Build velnor-runner .deb(s) for Linux on a version tag, attach them to the GitHub
# Release (source), and (optionally) push them to the velnor-apt repo so it can
# publish the apt repository.
#
# We only target the latest and greatest Debian (recent glibc via zigbuild,
# no old-glibc .2.17 compatibility shims — those are only for the portable
# tarball builds if/when a general release.yml exists).
# $auto depends in cargo-deb + modern target produce a .deb suitable for current Debian/Ubuntu.
#
# Uses the same jdx/mise-action + zigbuild + sccache + mold pattern as holla
# (and jackin-project/jackin) for consistency across tailrocks projects.
# See holla's release-deb.yml for the reference implementation.
#
# Separate from any general release flow (if one is added later for tarballs etc.)
# so that .debs can be cross-uploaded to velnor-apt's own releases (allowing
# its publish.yml to consume them with default GITHUB_TOKEN).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build the .deb(s) for (e.g. v0.1.0)."
        type: string
        required: true
      lanes:
        type: choice
        default: velnor
        options: [velnor, github, both]

permissions:
  contents: write # create/upload the GitHub Release asset on the source repo

concurrency:
  group: release-deb-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deb:
    name: Build deb ${{ matrix.target }} (${{ matrix.config.lane }})
    timeout-minutes: 45
    # Linux-only .deb builds for the velnor-apt repository.
    # Uses the exact same jdx/mise-action + zigbuild pattern as holla (and jackin).
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}

    runs-on: ${{ matrix.config.runner }}
    env:
      VERSION: ${{ github.event.inputs.tag && github.event.inputs.tag || github.ref_name }}
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_CACHE_SIZE: 20G
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Install mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true
        with:
          version: v0.16.0
          disable_annotations: "false"

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "rust zig cargo-binstall cargo:cargo-zigbuild"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      # OpenSSL is vendored (native-tls-vendored), so no system libssl or
      # cross :arm64 packages are needed — zigbuild supplies the toolchain.

      - name: Install cargo-deb
        # cargo.binstall_only + quickinstall are repository policy: download
        # the verified prebuilt artifact or fail; never compile tooling in CI.
        run: |
          mise exec cargo-binstall -- cargo binstall cargo-deb@3.7.0 \
            --disable-strategies compile --no-confirm --force
          cargo-deb --version

      - name: Build
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build .deb (version pinned to the tag)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # --no-strip: binaries are stripped at link time (profile.release);
          # the host strip cannot process a cross-built foreign-arch ELF.
          cargo deb -p velnor-runner --target ${{ matrix.target }} --no-build --no-strip --deb-version "$VERSION"
          ls -la target/${{ matrix.target }}/debian/*.deb

      - name: Stage .deb for artifacts
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          DEB_SRC=$(find "target/${{ matrix.target }}/debian" -maxdepth 1 -name "velnor-runner_*.deb" | head -1)
          # Guard: a deb without the binary is ~4KB (the 0.1.2 incident —
          # cargo-deb's explicit assets list had dropped the implicit binary).
          # Require the packaged binary to be present and the deb to be sane.
          dpkg-deb -c "$DEB_SRC" | grep -q "usr/bin/velnor-runner" \
            || { echo "deb does not contain usr/bin/velnor-runner" >&2; exit 1; }
          dpkg-deb -c "$DEB_SRC" | grep -q "usr/share/velnor/job-ubuntu.Dockerfile" \
            || { echo "deb does not contain the canonical job-image Dockerfile" >&2; exit 1; }
          [ "$(stat -c%s "$DEB_SRC")" -gt 1000000 ] \
            || { echo "deb suspiciously small: $(stat -c%s "$DEB_SRC") bytes" >&2; exit 1; }
          DEB_DST="velnor-runner-${VERSION}-${{ matrix.target }}.deb"
          cp "$DEB_SRC" "$DEB_DST"
          sha256sum "$DEB_DST" | awk '{print $1}' > "$DEB_DST.sha256"
          ls -l "$DEB_DST"*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: velnor-runner-deb-${{ matrix.config.lane }}-${{ matrix.target }}
          path: |
            velnor-runner-*.deb
            velnor-runner-*.deb.sha256

  attach-and-deliver:
    needs: build-deb
    if: always()
    name: Deliver deb (${{ matrix.config.lane }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        if: matrix.config.writer
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: matrix.config.writer
        with:
          path: artifacts
          pattern: velnor-runner-deb-${{ matrix.config.lane }}-*
          merge-multiple: true

      - name: Attach .deb(s) to the GitHub Release (source)
        if: matrix.config.writer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Guard: this job runs with if:always() so partial matrix successes still
          # deliver, but with zero built debs there is nothing to release — and
          # `gh release create` on a missing tag would mint the tag at main HEAD.
          shopt -s nullglob
          debs=(artifacts/velnor-runner-*-unknown-linux-gnu.deb)
          if [ "${#debs[@]}" -eq 0 ]; then
            echo "No .deb artifacts were built; refusing to create/upload a release." >&2
            exit 1
          fi
          # Create the release if it does not exist yet, then upload the deb assets.
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" artifacts/velnor-runner-*-unknown-linux-gnu.deb artifacts/velnor-runner-*-unknown-linux-gnu.deb.sha256 --clobber

      - name: Push .deb(s) to velnor-apt + trigger publish (optional)
        if: matrix.config.writer
        # Same pattern as holla: the source may be private (or we want consistent
        # delivery). velnor-apt publishes from its *own* release. So we upload the
        # .deb(s) to a velnor-apt release (same tag), then trigger its publish workflow.
        # Needs GH_VELNOR_APT_TOKEN: a PAT with Contents:write + Actions:write on
        # tailrocks/velnor-apt. Without it, publish manually (see echo below).
        env:
          APT_TOKEN: ${{ secrets.GH_VELNOR_APT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APT_TOKEN:-}" ]; then
            echo "No GH_VELNOR_APT_TOKEN secret; skipping auto-publish to apt."
            echo "Publish manually:"
            echo "  gh release upload $TAG velnor-runner-*-unknown-linux-gnu.deb velnor-runner-*-unknown-linux-gnu.deb.sha256 --repo tailrocks/velnor-apt --clobber"
            echo "  gh workflow run publish.yml --repo tailrocks/velnor-apt -f version=$TAG"
            exit 0
          fi
          export GH_TOKEN="$APT_TOKEN"
          gh release view "$TAG" --repo tailrocks/velnor-apt >/dev/null 2>&1 \
            || gh release create "$TAG" --repo tailrocks/velnor-apt --title "velnor-runner $TAG (debs)" --notes "velnor-runner .debs for apt repository (amd64 + arm64)."
          gh release upload "$TAG" artifacts/velnor-runner-*-unknown-linux-gnu.deb artifacts/velnor-runner-*-unknown-linux-gnu.deb.sha256 --repo tailrocks/velnor-apt --clobber
          gh workflow run publish.yml --repo tailrocks/velnor-apt -f version="$TAG"
          echo "Uploaded velnor-runner debs to velnor-apt $TAG and triggered publish."
