name: Release deb

# Build the velnor-runner .deb on a version tag, attach it to the GitHub
# Release, and (optionally) trigger the velnor-apt repo to publish it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build the .deb for (e.g. v0.1.0)."
        type: string
        required: true

permissions:
  contents: write # create/upload the GitHub Release asset

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb (version pinned to the tag)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          cargo deb -p velnor-runner --deb-version "$VERSION"
          ls -la target/debian/*.deb

      - name: Attach .deb to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          DEB="$(ls target/debian/velnor-runner_*_amd64.deb)"
          # Create the release if it does not exist yet, then upload the asset.
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" "$DEB" --clobber

      - name: Push .deb to velnor-apt + trigger publish (optional)
        # velnor is private; velnor-apt publishes from its OWN release. So upload
        # the .deb to a velnor-apt release, then dispatch its publish workflow.
        # Needs GH_VELNOR_APT_TOKEN: a fine-grained PAT with Contents:write +
        # Actions:write on tailrocks/velnor-apt. Without it, publish manually.
        env:
          APT_TOKEN: ${{ secrets.GH_VELNOR_APT_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          DEB="$(ls target/debian/velnor-runner_*_amd64.deb)"
          if [ -z "${APT_TOKEN:-}" ]; then
            echo "No GH_VELNOR_APT_TOKEN secret; skipping auto-publish."
            echo "Publish manually:"
            echo "  gh release upload $TAG '$DEB' --repo tailrocks/velnor-apt --clobber"
            echo "  gh workflow run publish.yml --repo tailrocks/velnor-apt -f version=$TAG"
            exit 0
          fi
          export GH_TOKEN="$APT_TOKEN"
          gh release view "$TAG" --repo tailrocks/velnor-apt >/dev/null 2>&1 \
            || gh release create "$TAG" --repo tailrocks/velnor-apt --title "velnor-runner $TAG" --notes "velnor-runner .deb (amd64)."
          gh release upload "$TAG" "$DEB" --repo tailrocks/velnor-apt --clobber
          gh workflow run publish.yml --repo tailrocks/velnor-apt -f version="$TAG"
          echo "Uploaded $DEB to velnor-apt $TAG and triggered publish."
