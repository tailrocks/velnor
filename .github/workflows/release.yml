on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag
        type: string
        required: true
      lanes:
        type: choice
        default: velnor
        options: [velnor, github, both]

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    name: Check version (${{ matrix.config.lane }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          version="${{ inputs.tag || github.ref_name }}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    name: Build ${{ matrix.target }} (${{ matrix.config.lane }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_CACHE_SIZE: 20G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Install mold linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true
        with:
          version: v0.16.0
          disable_annotations: "false"

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: "rust zig cargo-binstall cargo:cargo-zigbuild"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Build
        run: cargo zigbuild -p velnor-runner --release --locked --target ${{ matrix.target }}.2.17

      - name: Package
        run: |
          archive="velnor-runner-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" velnor-runner
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: velnor-runner-${{ matrix.config.lane }}-${{ matrix.target }}
          path: |
            velnor-runner-*.tar.gz
            velnor-runner-*.tar.gz.sha256

  release:
    needs: [check-version, build]
    name: Publish release (${{ matrix.config.lane }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    permissions:
      contents: write
    outputs:
      arm64_linux: ${{ steps.shas.outputs.arm64_linux }}
      x86_linux: ${{ steps.shas.outputs.x86_linux }}
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        if: matrix.config.writer
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: matrix.config.writer
        with:
          path: artifacts
          pattern: velnor-runner-${{ matrix.config.lane }}-*
          merge-multiple: true

      - name: Read platform SHA256s
        if: matrix.config.writer
        id: shas
        run: |
          read_sha() { awk '{print $1}' "artifacts/$1.sha256"; }
          {
            echo "arm64_linux=$(read_sha "velnor-runner-${VERSION}-aarch64-unknown-linux-gnu.tar.gz")"
            echo "x86_linux=$(read_sha "velnor-runner-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: matrix.config.writer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${VERSION}"
          gh release view "$tag" >/dev/null 2>&1 || {
            gh release create "$tag" --title "$tag" --generate-notes \
              || gh release view "$tag" >/dev/null
          }
          gh release upload "$tag" \
            artifacts/velnor-runner-*.tar.gz \
            artifacts/velnor-runner-*.tar.gz.sha256 \
            --clobber

  # Homebrew: to be added modeled exactly on holla's release.yml `homebrew` job
  # once the tailrocks/homebrew-velnor tap and its push token exist
  # (docs/master-plan.md P1.8).
