name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lanes:
        type: choice
        default: velnor
        options: [velnor, github, both]

concurrency:
  group: renovate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renovate:
    name: Renovate (${{ matrix.config.lane }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Self-hosted Renovate
        # The PAT named "tailrocks-renovate" (fine-grained, not classic) must be
        # stored in the repo secret GH_RENOVATE_TOKEN.
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ secrets.GH_RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_DRY_RUN: ${{ matrix.config.writer && 'null' || 'full' }}
          # Pin the git author identity so the DCO sign-off trailer in
          # renovate.json::commitBody always matches the commit-author
          # email. DCO-2 requires the Signed-off-by email to equal the
          # commit-author email; without this pin, a change in Renovate's
          # default author would silently break DCO on every Renovate PR.
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@whitesourcesoftware.com>"
          LOG_LEVEL: debug
