[tools]
actionlint = "1.7.12"
cargo-binstall = "1.21.0"
"cargo:cargo-deny" = "0.20.0"
"cargo:cargo-nextest" = "0.9.137"
"cargo:cargo-zigbuild" = "0.23.0"
"cargo:cargo-deb" = "3.7.0"
zig = "0.16.0"

[settings]
idiomatic_version_file_enable_tools = ["rust"]
cargo.binstall_only = true
cargo.binstall_quickinstall = true

[tasks.fmt]
run = "cargo fmt --all --check"

[tasks.lint]
run = "cargo clippy --workspace --all-targets --locked -- -D warnings"

[tasks.test]
run = "cargo nextest run --workspace --locked --color=always"

[tasks.actionlint]
run = "actionlint"

[tasks.deny]
run = "cargo deny check advisories"

[tasks.check]
depends = ["fmt", "actionlint", "deny", "lint", "test"]
